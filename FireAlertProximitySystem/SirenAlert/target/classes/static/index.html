<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Siren Alert LA – Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css">

    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />
    <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
    ></script>

</head>
<body>
<h2>Map</h2>
<div id="map" style="height: 500px; width: 100%; border: 1px solid black;"></div>

<h1>Siren Alert LA</h1>

<!-- SIRENS SECTION -->
<div class="section">
    <h2>Sirens</h2>
    <table id="sirenTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Status</th>
            <th>Out of Service</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Add New Siren</h3>
    <label>Latitude:</label><br>
    <input id="newLat" type="number" step="0.0001"><br>
    <label>Longitude:</label><br>
    <input id="newLon" type="number" step="0.0001"><br>
    <button id="createSirenBtn">🚨 Add New Siren 🚨</button>
</div>

<!-- UPDATE SIREN FORM -->
<div class="section" id="updateSirenFormContainer" style="display:none; border:1px solid #ccc; padding:10px; margin-top:20px;">
    <h3>Update Siren</h3>
    <form id="updateSirenForm">
        <input id="updateSirenId" type="hidden">

        <label>Latitude:</label><br>
        <input id="updateLatitude" type="number" step="0.0001"><br>

        <label>Longitude:</label><br>
        <input id="updateLongitude" type="number" step="0.0001"><br>

        <label>Out of Service:</label>
        <input id="updateOutOfServiceCheckbox" type="checkbox"><br><br>

        <button type="submit">Update Siren</button>
        <button type="button" onclick="document.getElementById('updateSirenFormContainer').style.display='none'">Cancel</button>
    </form>
</div>

<!-- FIRES SECTION -->
<div class="section">
    <h2>Active Fires</h2>
    <table id="fireTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Latitude</th>
            <th>Longitude</th>
            <th>Time Started</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Report Fire</h3>
    <label>Latitude:</label><br>
    <input id="newLatitude" type="number" step="0.0001"><br>
    <label>Longitude:</label><br>
    <input id="newLongitude" type="number" step="0.0001"><br>
    <button id="createFireBtn">🔥 Report Fire 🔥</button>
</div>

<!-- UPDATE FIRE FORM -->
<div class="section" id="updateFireFormContainer" style="display:none; border:1px solid #ccc; padding:10px; margin-top:20px;">
    <h3>Update Fire</h3>
    <form id="updateFireForm">
        <input id="updateFireId" type="hidden">

        <label>Latitude:</label><br>
        <input id="updateFireLatitude" type="number" step="0.0001"><br>

        <label>Longitude:</label><br>
        <input id="updateFireLongitude" type="number" step="0.0001"><br>

        <button type="submit">Update Fire</button>
        <button type="button" onclick="document.getElementById('updateFireFormContainer').style.display='none'">Cancel</button>
    </form>
</div>

<script>
    const API_BASE_URL = "http://localhost:8080";
</script>
<script src="js/sirenScript.js"></script>
<script src="js/fireScript.js"></script>
<script src="js/map.js"></script>
</body>
</html>
