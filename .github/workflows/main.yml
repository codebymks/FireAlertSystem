#Deploy later
name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./FireAlertProximitySystem/SirenAlert
          file: ./FireAlertProximitySystem/SirenAlert/Dockerfile
          push: false
