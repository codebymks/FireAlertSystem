name: CI

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./FireAlertProximitySystem/SirenAlert
          file: ./FireAlertProximitySystem/SirenAlert/Dockerfile
          push: true
          tags: ghcr.io/codebymks/firealertsystem/fire-alert-system:latest
